<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kevin caldwell</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #f0ead8;
    --ink-muted: #a09880;
    --ink-faint: #4a4640;
    --paper: #0a0a08;
    --accent: #e8930a;
    --border: rgba(240,234,216,0.1);
  }

  html, body { height: 100%; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    padding: 0 2rem;
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    max-width: 580px;
    margin: 0 auto;
    width: 100%;
    padding: 5rem 0 2rem;
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 2rem;
  }

  h1 {
    font-size: clamp(2rem, 7vw, 3.2rem);
    font-weight: 400;
    line-height: 1.05;
    letter-spacing: -0.01em;
    margin-bottom: 1.25rem;
    color: var(--accent);
  }

  .subhead {
    font-size: 12px;
    line-height: 1.9;
    color: var(--ink-muted);
    letter-spacing: 0.04em;
    max-width: 420px;
    margin-bottom: 3.5rem;
  }

  .project-link {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    color: var(--ink);
    border-top: 0.5px solid var(--border);
    border-bottom: 0.5px solid var(--border);
    padding: 14px 0;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: color 0.15s, border-color 0.15s;
  }

  .project-link + .project-link {
    border-top: none;
  }

  .project-link:hover {
    color: var(--accent);
    border-color: rgba(232,147,10,0.3);
  }

  .project-link .arrow {
    margin-left: auto;
    color: var(--ink-faint);
    transition: transform 0.15s, color 0.15s;
  }

  .project-link:hover .arrow {
    transform: translate(2px, -2px);
    color: var(--accent);
  }

  .project-meta {
    color: var(--ink-faint);
    font-size: 10px;
  }

  footer {
    max-width: 580px;
    margin: 0 auto;
    width: 100%;
    padding: 2rem 0 2.5rem;
    display: flex;
    gap: 1.5rem;
    border-top: 0.5px solid var(--border);
  }

  footer a {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-faint);
    text-decoration: none;
    transition: color 0.15s;
  }

  footer a:hover {
    color: var(--accent);
  }
</style>
</head>
<body>
<main>
  <p class="eyebrow">kevin caldwell</p>
  <h1>thinking clearly<br>about AI</h1>
  <p class="subhead">technical decisions are also social ones.</p>

  <a class="project-link" href="https://kvncaldwll.github.io/AISC-P-Doom-Tool">
    <span>p(doom) tool</span>
    <span class="project-meta">AI Safety Camp 2026</span>
    <span class="arrow">↗</span>
  </a>
</main>

<footer>
  <a href="mailto:kvn.caldwll@gmail.com">email</a>
  <a href="https://github.com/kvncaldwll">github</a>
</footer>
</body>
</html>
